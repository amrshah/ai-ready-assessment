services:
  app:
    build: .
    container_name: alamia-ai-ready-assessment
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=/app/data/leads.db
    volumes:
      - ./data:/app/data
      # We'll update the server to store the DB in /app/data for persistence
    restart: always

volumes:
  data:
